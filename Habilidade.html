<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Árvore de Habilidades</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a1d; color: #d3d3d3; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background-color: #2b2b30; padding: 30px; border-radius: 10px; }
        h1 { color: #c3073f; text-align: center; border-bottom: 2px solid #c3073f; padding-bottom: 10px; }
        
        .hab-card {
            background-color: #3b3b40;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            border-left: 4px solid #4e4e50; /* Cor padrão (Não comprada) */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Se o jogador já tem a habilidade, ela fica destacada em vermelho e dourado */
        .hab-card.desbloqueada {
            border-left: 4px solid #c3073f;
            background-color: #4a2e35;
        }

        .hab-info h3 { margin: 0 0 5px 0; color: #ffffff; }
        .hab-stats { font-size: 0.9em; color: #a1a1a1; margin-bottom: 8px; }
        .status-badge {
            padding: 5px 10px; border-radius: 3px; font-weight: bold; font-size: 0.8em;
        }
        .badge-sim { background-color: #c3073f; color: white; }
        .badge-nao { background-color: #4e4e50; color: #d3d3d3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🗡️ Habilidades da Classe</h1>

        <div th:each="hab : ${habilidades}" th:classappend="${hab.desbloqueada} ? 'desbloqueada' : ''" class="hab-card">
            
            <div class="hab-info">
                <h3 th:text="${hab.nome}">Nome da Habilidade</h3>
                <div class="hab-stats">
                    ⚔️ Dano: <span th:text="${hab.dano}"></span> | 
                    💧 Custo Mana: <span th:text="${hab.custoMana}"></span>
                </div>
                <div th:text="${hab.descricao}">Descrição</div>
            </div>

            <div>
                <span th:if="${hab.desbloqueada}" class="status-badge badge-sim">Adquirida</span>
                <span th:unless="${hab.desbloqueada}" class="status-badge badge-nao">Bloqueada</span>
            </div>

        </div>

        <br>
        <a href="/" style="color: #c3073f;">← Voltar</a>
    </div>

</body>
</html>
